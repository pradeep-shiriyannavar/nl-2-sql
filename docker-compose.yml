version: "3.9"

services:
  app:
    build: .
    container_name: nl2sql-app
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: nl2sql-db
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_DATABASE: db_blockchain_ehr_test
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

volumes:
  mysql_data:
